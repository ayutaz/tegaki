# GitHub Actions workflow to deploy Astro docs to GitHub Pages
# See: https://docs.astro.build/en/guides/deploy/github/

name: Deploy Docs to GitHub Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/deploy-docs.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: bun install

      - name: Cache KanjiVG tarball
        uses: actions/cache@v4
        with:
          path: packages/dataset-cjk-kanjivg/.cache
          key: kanjivg-${{ hashFiles('packages/dataset-cjk-kanjivg/src/constants.ts') }}

      - name: Fetch KanjiVG SVGs
        # Populates packages/dataset-cjk-kanjivg/kanjivg/*.svg and regenerates
        # src/manifest.ts so Vite's import.meta.glob has stroke data to bundle.
        # The SVGs are gitignored — without this step the website ships without
        # any kanji coverage and every CJK lookup silently falls back to the
        # heuristic skeletonizer.
        run: bun scripts/fetch-kanjivg.ts
        working-directory: ./packages/dataset-cjk-kanjivg

      - name: Build renderer
        run: bun run build
        working-directory: ./packages/renderer

      - name: Build docs
        run: bun run build
        working-directory: ./packages/website
        env:
          # Pass the base path from Pages configuration
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Node's default heap is 4 GB; 3,089 SVG dynamic-import chunks
          # plus the rest of the site push memory close to that ceiling.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./packages/website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
